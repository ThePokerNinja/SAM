# S.A.M. Phase 0 ť voice.michaelstewman.com portal + token server + LiveKit agent worker.
#
# First-time setup (Render dashboard):
#   1. New ? Blueprint ? connect ThePokerNinja/SAM ? Apply
#   2. Set sync:false secrets on sam-token + sam-agent (see deploy/README.md)
#   3. Custom domain voice.michaelstewman.com on sam-voice-portal (Settings ? Custom Domains)
#   4. Re-deploy sam-voice-portal after sam-token is live (VITE_TOKEN_URL linkage)
#
# Optional: create an Environment Group "sam-prod" and attach to all three services.

services:
  # Mints LiveKit join tokens for the browser client.
  - type: web
    name: sam-token
    runtime: python
    rootDir: worker
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server.token_server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: SAM_ALLOWED_ORIGINS
        value: https://voice.michaelstewman.com

  # Static React portal (candle intro + voice UI). Custom domain: voice.michaelstewman.com
  - type: web
    name: sam-voice-portal
    runtime: static
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_TOKEN_URL
        fromService:
          type: web
          name: sam-token
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # LiveKit Agents worker ť auto-dispatches Samuel into rooms the portal creates.
  - type: pserv
    name: sam-agent
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile
    dockerContext: .
    plan: standard
    region: oregon
    maxShutdownDelaySeconds: 300
    # No scaling block — autoscaling requires a paid workspace (not Hobby).
    envVars:
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_MODEL
        value: eleven_flash_v2_5
      - key: SAM_VOICE_ID
        sync: false
      - key: SAM_STT_MODEL
        value: deepgram/nova-3
      - key: SAM_INTERRUPT_MIN_DURATION
        value: "0.8"
      - key: SAM_INTERRUPT_MIN_WORDS
        value: "2"
      - key: SAM_ENDPOINTING_MIN
        value: "0.3"
      - key: SAM_ENDPOINTING_MAX
        value: "1.2"
      - key: RM_API_BASE_URL
        value: https://rainmaker-api-waqs.onrender.com
